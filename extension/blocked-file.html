<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SafeLink AI - Download Blocked</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --primary: #e94560;
      --text: #f0f0f5;
      --text-muted: #8b8b99;
      --border: #2a2a35;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      color: var(--primary);
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .details {
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 25px;
      text-align: left;
      font-size: 14px;
      border: 1px solid var(--border);
    }

    .details div {
      margin-bottom: 8px;
      word-break: break-all;
    }

    .details strong {
      color: var(--text);
    }

    .btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      background: #ff5270;
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="icon">🚨</div>
    <h1>Malicious Download Blocked</h1>
    <p>SafeLink AI interrupted a file download because it matched known malware signatures or behavioral threats.</p>

    <div class="details">
      <div><strong>Filename:</strong> <span id="filename">Loading...</span></div>
      <div><strong>Threat Score:</strong> <span id="score">...</span>/100</div>
      <div><strong>MD5 Hash:</strong> <span id="hash" style="font-family: monospace;">...</span></div>
      <div><strong>File Type:</strong> <span id="ext">...</span></div>
    }
    </div>

    <button id="closeBtn" class="btn">Close Tab</button>

    <div style="margin-top: 30px; font-size: 13px; color: var(--text-muted); opacity: 0.8;">
      🛡️ SafeLink AI • Made by Yash IT16
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("filename").textContent = params.get("filename") || "Unknown";
    document.getElementById("score").textContent = params.get("score") || "Unknown";
    document.getElementById("hash").textContent = params.get("hash") || "N/A";
    document.getElementById("ext").textContent = params.get("ext") || "Unknown";

    document.getElementById("closeBtn").addEventListener('click', () => {
      window.close();
    });
  </script>
</body>
</html>
